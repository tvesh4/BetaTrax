$kind: http-request
method: POST
url: '{{baseUrl}}/api/comment/{{reportId}}/'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "id": "CMT-001",
      "authorId": "TESTER-1",
      "content": "This is a comment."
    }
